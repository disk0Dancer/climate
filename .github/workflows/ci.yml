name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Auto-format Go code
        run: gofmt -w .

      - name: Auto-fix golangci-lint issues
        id: golangci_autofix
        continue-on-error: true
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.3
          args: --fix

      - name: Auto-commit fix changes
        if: (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)) && steps.golangci_autofix.outcome == 'success'
        run: |
          if git diff --quiet; then
            echo "No auto-fix changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No staged changes to commit"
            exit 0
          fi

          git commit -m "ci: auto-fix gofmt and golangci-lint"
          git push

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.3

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Run go vet
        run: go vet ./...

      - name: Build
        run: go build ./...
