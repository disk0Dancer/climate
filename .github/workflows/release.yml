name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  HOMEBREW_TAP_REPO: disk0Dancer/homebrew-tap

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          BINARY="climate-${GOOS}-${GOARCH}${EXT}"
          go build -ldflags="-X github.com/disk0Dancer/climate/cmd/climate/commands.version=${VERSION}" -o "${BINARY}" ./cmd/climate
          echo "BINARY=${BINARY}" >> "$GITHUB_ENV"

      - name: Package binary
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "climate-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "${BINARY}"
            echo "ARCHIVE=climate-${{ matrix.goos }}-${{ matrix.goarch }}.zip" >> "$GITHUB_ENV"
          else
            tar czf "climate-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "${BINARY}"
            echo "ARCHIVE=climate-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Compute SHA256
        run: |
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          generate_release_notes: true

  update-homebrew-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Check secret availability
        id: tap-secret
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN is not configured; skipping Homebrew tap sync for this release."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.tap-secret.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Set version from tag
        if: steps.tap-secret.outputs.configured == 'true'
        id: version
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "source_url=https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Download tagged source archive
        if: steps.tap-secret.outputs.configured == 'true'
        run: curl -fsSL -o climate-source.tar.gz "${{ steps.version.outputs.source_url }}"

      - name: Compute source SHA256
        if: steps.tap-secret.outputs.configured == 'true'
        id: source
        run: echo "sha256=$(sha256sum climate-source.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Clone Homebrew tap
        if: steps.tap-secret.outputs.configured == 'true'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" "${RUNNER_TEMP}/homebrew-tap"

      - name: Render formula
        if: steps.tap-secret.outputs.configured == 'true'
        run: |
          mkdir -p "${RUNNER_TEMP}/homebrew-tap/Formula"
          bash scripts/render_homebrew_formula.sh \
            "${{ steps.version.outputs.tag }}" \
            "${{ steps.source.outputs.sha256 }}" \
            > "${RUNNER_TEMP}/homebrew-tap/Formula/climate.rb"

      - name: Commit and push tap update
        if: steps.tap-secret.outputs.configured == 'true'
        working-directory: ${{ runner.temp }}/homebrew-tap
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git diff --quiet -- Formula/climate.rb; then
            echo "Formula already up to date."
            exit 0
          fi

          git config user.name "disk0Dancer"
          git config user.email "gchuracov.003@gmail.com"
          git add Formula/climate.rb
          cat > commit-message.txt <<EOF
          Update climate Homebrew formula for ${RELEASE_TAG}

          Automated sync after publishing a tagged climate release.

          Constraint: Homebrew formula must stay pinned to a concrete tagged source archive
          Rejected: latest release URL | unstable sha256 and non-reproducible formula updates
          Confidence: high
          Scope-risk: narrow
          Directive: Keep formula url + sha256 tied to immutable tags; never switch stable to latest
          Tested: GitHub release asset publication completed before tap sync
          Not-tested: brew install execution on the GitHub Actions runner
          EOF
          git commit -F commit-message.txt
          git push origin HEAD:main
