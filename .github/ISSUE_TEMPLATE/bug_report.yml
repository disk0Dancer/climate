name: Bug report
description: Report a reproducible problem in climate
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps, commands, and inputs.
      placeholder: |
        1. Run ...
        2. Generate ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: climate version
      placeholder: e.g. climate version output
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, Go version (if building from source), etc.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/output
      render: shell
